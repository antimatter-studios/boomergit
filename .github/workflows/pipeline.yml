name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Package VSIX
        run: npm run package
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: build/*.vsix
          if-no-files-found: error

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test

  release:
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "Tag: $TAG   package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Use 'npm version <bump>' so they stay in sync." >&2
            exit 1
          fi

      - name: Package VSIX
        run: npm run package

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          V="$(node -p "require('./package.json').version")"
          if node scripts/extract-changelog.mjs "$V" > release-notes.md && [ -s release-notes.md ]; then
            echo "Using CHANGELOG section for v$V as release notes."
            echo "file=release-notes.md" >> "$GITHUB_OUTPUT"
          else
            echo "No CHANGELOG entry for v$V — falling back to auto-generated notes."
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      # Publishes are idempotent: each target is skipped if this version is
      # already live, so re-running the job after a partial failure (one
      # marketplace ok, the other transiently failed) completes the missing
      # publish instead of erroring on a duplicate upload. Open VSX runs first
      # so the higher-risk target fails fast before the Marketplace is touched.
      - name: Publish to Open VSX
        run: |
          V="$(node -p "require('./package.json').version")"
          code=$(curl -sS -o /dev/null -w '%{http_code}' "https://open-vsx.org/api/ChristopherThomas/boomergit/$V" || echo 000)
          if [ "$code" = "200" ]; then
            echo "Open VSX already has v$V — skipping."
          else
            npm run publish:openvsx
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to VS Code Marketplace
        run: |
          V="$(node -p "require('./package.json').version")"
          if npx --no-install vsce show ChristopherThomas.boomergit --json 2>/dev/null \
              | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{let f=false;try{const j=JSON.parse(d);for(const x of (j.versions||[]))if(x.version===process.argv[1]){f=true;break}}catch{}process.exit(f?0:1)})' "$V"; then
            echo "VS Code Marketplace already has v$V — skipping."
          else
            npm run publish:vscode
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" build/*.vsix --clobber
          elif [ -n "${{ steps.notes.outputs.file }}" ]; then
            gh release create "$GITHUB_REF_NAME" build/*.vsix --title "$GITHUB_REF_NAME" --notes-file "${{ steps.notes.outputs.file }}"
          else
            gh release create "$GITHUB_REF_NAME" build/*.vsix --title "$GITHUB_REF_NAME" --generate-notes
          fi
