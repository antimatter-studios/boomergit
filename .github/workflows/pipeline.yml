name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Package VSIX
        run: npm run package
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: build/*.vsix
          if-no-files-found: error

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test

  # Release-on-merge: main is protected (PR-only), so releases can't be tag-
  # pushed directly. Instead, when a version bump lands on main (via a release
  # PR), this job publishes and creates the GitHub Release + tag. It self-gates
  # by checking whether the current package.json version already has a tag, so
  # ordinary (non-release) merges are no-ops.
  release:
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need existing tags to detect an already-released version
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Detect version bump
        id: check
        run: |
          V="$(node -p "require('./package.json').version")"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # Gate on whether this push changed the version vs the commit before it,
          # NOT on whether the tag exists — so re-running this run after a partial
          # publish re-enters the (idempotent) steps and completes the release.
          BEFORE="${{ github.event.before }}"
          PREV=""
          if [ -n "$BEFORE" ] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            PREV="$(git show "$BEFORE:package.json" 2>/dev/null \
              | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{try{console.log(JSON.parse(d).version)}catch{console.log("")}})')"
          fi
          echo "version: prev=${PREV:-<none>} current=$V"
          if [ "$V" != "$PREV" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package VSIX
        if: steps.check.outputs.release == 'true'
        run: npm run package

      - name: Extract release notes from CHANGELOG
        if: steps.check.outputs.release == 'true'
        id: notes
        run: |
          V="${{ steps.check.outputs.version }}"
          if node scripts/extract-changelog.mjs "$V" > release-notes.md && [ -s release-notes.md ]; then
            echo "Using CHANGELOG section for v$V as release notes."
            echo "file=release-notes.md" >> "$GITHUB_OUTPUT"
          else
            echo "No CHANGELOG entry for v$V — falling back to auto-generated notes."
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      # Publishes are idempotent: each target is skipped if this version is
      # already live, so re-running the job after a partial failure (one
      # marketplace ok, the other transiently failed) completes the missing
      # publish instead of erroring on a duplicate upload. Open VSX runs first
      # so the higher-risk target fails fast before the Marketplace is touched.
      - name: Publish to Open VSX
        if: steps.check.outputs.release == 'true'
        run: |
          V="${{ steps.check.outputs.version }}"
          code=$(curl -sS -o /dev/null -w '%{http_code}' "https://open-vsx.org/api/ChristopherThomas/boomergit/$V" || echo 000)
          if [ "$code" = "200" ]; then
            echo "Open VSX already has v$V — skipping."
          else
            npm run publish:openvsx
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to VS Code Marketplace
        if: steps.check.outputs.release == 'true'
        run: |
          V="${{ steps.check.outputs.version }}"
          if npx --no-install vsce show ChristopherThomas.boomergit --json 2>/dev/null \
              | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{let f=false;try{const j=JSON.parse(d);for(const x of (j.versions||[]))if(x.version===process.argv[1]){f=true;break}}catch{}process.exit(f?0:1)})' "$V"; then
            echo "VS Code Marketplace already has v$V — skipping."
          else
            npm run publish:vscode
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release + tag
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.check.outputs.version }}"
          NOTES="${{ steps.notes.outputs.file }}"
          # Idempotent: if a prior (partial) run already created the release+tag,
          # just (re)attach the VSIX so a re-run completes recovery; otherwise
          # create it (gh makes the tag at the merged commit).
          if gh release view "v$V" >/dev/null 2>&1; then
            gh release upload "v$V" build/*.vsix --clobber
          elif [ -n "$NOTES" ]; then
            gh release create "v$V" build/*.vsix --title "v$V" --notes-file "$NOTES" --target "$GITHUB_SHA"
          else
            gh release create "v$V" build/*.vsix --title "v$V" --generate-notes --target "$GITHUB_SHA"
          fi
